# The main pipeline for assetbundle

resources:
  pipelines:
    assetbundle_etl:
      name: assetbundle_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/assetbundle_etl"

      libraries:
        - glob:
            include: ../src/assetbundle_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
